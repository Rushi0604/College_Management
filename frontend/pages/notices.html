<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notices — EduPulse</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <!-- Sidebar injected dynamically by JS -->
  </aside>

  <div class="main-content">
    <header class="header">
      <div>
        <div class="header-title">Notices & Announcements</div>
        <div class="header-subtitle">Post and manage college-wide notices</div>
      </div>
      <div class="header-spacer"></div>
      <div class="online-indicator" id="rtStatus"><div class="online-dot"></div> Live</div>
      <div class="header-actions">
        <button class="header-btn">🔔</button>
      </div>
    </header>

    <main class="page-content">
      <div class="page-header">
        <div class="page-header-left">
          <h1>Notices & Announcements</h1>
          <p>Post notices and announcements visible to students and/or faculty.</p>
        </div>
        <div class="page-header-right">
          <button class="btn btn-primary" onclick="openAddNotice()">📢 Post Notice</button>
        </div>
      </div>

      <!-- Filters -->
      <div style="display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap;">
        <button class="btn btn-secondary btn-sm" id="filter-all" onclick="filterNotices('all', this)">All</button>
        <button class="btn btn-secondary btn-sm" id="filter-general" onclick="filterNotices('general', this)">📋 General</button>
        <button class="btn btn-secondary btn-sm" id="filter-exam" onclick="filterNotices('exam', this)">📝 Exam</button>
        <button class="btn btn-secondary btn-sm" id="filter-holiday" onclick="filterNotices('holiday', this)">🎉 Holiday</button>
        <button class="btn btn-secondary btn-sm" id="filter-event" onclick="filterNotices('event', this)">🎪 Event</button>
        <button class="btn btn-secondary btn-sm" id="filter-urgent" onclick="filterNotices('urgent', this)">🚨 Urgent</button>
      </div>

      <!-- Notices Grid -->
      <div id="noticesGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:20px;">
        <div class="card" style="padding:40px;text-align:center;grid-column:1/-1;">
          <div class="loading-spinner"></div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- Add/Edit Notice Modal -->
<div class="modal-overlay" id="noticeModal">
  <div class="modal" style="max-width:600px;">
    <div class="modal-header">
      <div class="modal-title" id="noticeModalTitle">📢 Post New Notice</div>
      <button class="modal-close" onclick="Modal.close('noticeModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editNoticeId">
      <div class="form-group">
        <label class="form-label">Title</label>
        <input type="text" class="form-control" id="noticeTitle" placeholder="Notice title...">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Type</label>
          <select class="form-control" id="noticeType">
            <option value="general">📋 General</option>
            <option value="exam">📝 Exam</option>
            <option value="holiday">🎉 Holiday</option>
            <option value="event">🎪 Event</option>
            <option value="urgent">🚨 Urgent</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Audience</label>
          <select class="form-control" id="noticeAudience">
            <option value="all">👥 All</option>
            <option value="students">🎓 Students Only</option>
            <option value="faculty">👨‍🏫 Faculty Only</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Content</label>
        <textarea class="form-control" id="noticeContent" rows="5" placeholder="Write your notice content here..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="Modal.close('noticeModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveNotice()">📢 Post Notice</button>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
  const user = Auth.requireAuth();
  if (!user) throw new Error('Not authenticated');

  const isAdmin   = user.role === 'admin';
  const isFaculty = user.role === 'faculty';
  const isStudent = user.role === 'student';

  // Build role-aware sidebar
  (function buildSidebar() {
    const sidebar = document.getElementById('sidebar');
    const initials = (user.first_name?.[0] || '') + (user.last_name?.[0] || '');
    const roleLabel = isAdmin ? '🛡️ Administrator' : isFaculty ? '👨\u200D🏫 Faculty' : '🎓 Student';
    const panelLabel = isAdmin ? 'Admin Panel' : isFaculty ? 'Faculty Portal' : 'Student Portal';
    const dashHref = isAdmin ? '../dashboard/admin.html'
                   : isFaculty ? '../dashboard/faculty.html'
                   : '../dashboard/student.html';

    let navLinks = '';
    if (isAdmin) {
      navLinks = `
        <div class="nav-section-title">Main</div>
        <a class="nav-item" href="${dashHref}"><span class="nav-icon">📊</span> Dashboard</a>
        <div class="nav-section-title">Management</div>
        <a class="nav-item" href="students.html"><span class="nav-icon">🎓</span> Students</a>
        <a class="nav-item" href="faculty.html"><span class="nav-icon">👨\u200D🏫</span> Faculty</a>
        <a class="nav-item" href="courses.html"><span class="nav-icon">📚</span> Courses</a>
        <a class="nav-item" href="departments.html"><span class="nav-icon">🏛️</span> Departments</a>
        <div class="nav-section-title">Academic</div>
        <a class="nav-item" href="attendance.html"><span class="nav-icon">✅</span> Attendance</a>
        <a class="nav-item" href="grades.html"><span class="nav-icon">📝</span> Grades</a>
        <a class="nav-item" href="timetable.html"><span class="nav-icon">📅</span> Timetable</a>
        <div class="nav-section-title">Finance &amp; Comms</div>
        <a class="nav-item" href="fees.html"><span class="nav-icon">💰</span> Fee Management</a>
        <a class="nav-item active" href="notices.html"><span class="nav-icon">📢</span> Notices</a>`;
    } else if (isFaculty) {
      navLinks = `
        <div class="nav-section-title">Main</div>
        <a class="nav-item" href="${dashHref}"><span class="nav-icon">📊</span> Dashboard</a>
        <div class="nav-section-title">Academic</div>
        <a class="nav-item" href="courses.html"><span class="nav-icon">📚</span> My Courses</a>
        <a class="nav-item" href="attendance.html"><span class="nav-icon">✅</span> Attendance</a>
        <a class="nav-item" href="grades.html"><span class="nav-icon">📝</span> Grades</a>
        <a class="nav-item" href="faculty_timetable.html"><span class="nav-icon">📅</span> Timetable</a>
        <div class="nav-section-title">Communications</div>
        <a class="nav-item active" href="notices.html"><span class="nav-icon">📢</span> Notices</a>
        <a class="nav-item" href="hod_complaints.html"><span class="nav-icon">📣</span> Complaints</a>`;
    } else {
      navLinks = `
        <div class="nav-section-title">Main</div>
        <a class="nav-item" href="${dashHref}"><span class="nav-icon">📊</span> My Dashboard</a>
        <div class="nav-section-title">Academics</div>
        <a class="nav-item" href="student_attendance.html"><span class="nav-icon">✅</span> My Attendance</a>
        <a class="nav-item" href="student_grades.html"><span class="nav-icon">📝</span> My Grades</a>
        <a class="nav-item" href="student_timetable.html"><span class="nav-icon">📅</span> Timetable</a>
        <a class="nav-item" href="courses.html"><span class="nav-icon">📚</span> Courses</a>
        <div class="nav-section-title">Support &amp; Info</div>
        <a class="nav-item" href="student_complaints.html"><span class="nav-icon">📣</span> My Complaints</a>
        <a class="nav-item active" href="notices.html"><span class="nav-icon">📢</span> Notices</a>`;
    }

    sidebar.innerHTML = `
      <a class="sidebar-brand" href="${dashHref}">
        <div class="sidebar-brand-icon">🎓</div>
        <div class="sidebar-brand-text">
          <div class="sidebar-brand-title">EduPulse</div>
          <div class="sidebar-brand-subtitle">${panelLabel}</div>
        </div>
      </a>
      <nav class="sidebar-nav">${navLinks}</nav>
      <div class="sidebar-footer">
        <div class="sidebar-user" onclick="Auth.logout()">
          <div class="user-avatar">${initials.toUpperCase() || 'U'}</div>
          <div class="user-info">
            <div class="user-name">${user.first_name} ${user.last_name}</div>
            <div class="user-role">${roleLabel}</div>
          </div>
          <span style="color:var(--text-muted);">⏻</span>
        </div>
      </div>`;
  })();

  // Hide write actions (Post/Edit/Delete) for students and faculty
  if (isStudent) {
    const postBtn = document.querySelector('.page-header-right');
    if (postBtn) postBtn.style.display = 'none';
  }

  let allNotices = [];
  let currentFilter = 'all';
  let socket;

  const typeConfig = {
    general: { color: '#54A0FF', bg: 'rgba(84,160,255,0.1)', border: 'rgba(84,160,255,0.3)', icon: '📋', label: 'General' },
    exam:    { color: '#FF9F43', bg: 'rgba(255,159,67,0.1)',  border: 'rgba(255,159,67,0.3)',  icon: '📝', label: 'Exam' },
    holiday: { color: '#00D4AA', bg: 'rgba(0,212,170,0.1)',   border: 'rgba(0,212,170,0.3)',   icon: '🎉', label: 'Holiday' },
    event:   { color: '#6C63FF', bg: 'rgba(108,99,255,0.1)',  border: 'rgba(108,99,255,0.3)',  icon: '🎪', label: 'Event' },
    urgent:  { color: '#FF6B6B', bg: 'rgba(255,107,107,0.1)', border: 'rgba(255,107,107,0.3)', icon: '🚨', label: 'Urgent' },
  };

  async function loadNotices() {
    try {
      const data = await API.get('/notices/');
      allNotices = data.results || data;
      renderNotices(allNotices);
    } catch (e) {
      document.getElementById('noticesGrid').innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state-icon">📢</div><p>Could not load notices.</p></div>';
    }
  }

  function filterNotices(type, btn) {
    currentFilter = type;
    document.querySelectorAll('[id^="filter-"]').forEach(b => b.classList.remove('btn-primary'));
    document.querySelectorAll('[id^="filter-"]').forEach(b => b.classList.add('btn-secondary'));
    btn.classList.remove('btn-secondary');
    btn.classList.add('btn-primary');
    const filtered = type === 'all' ? allNotices : allNotices.filter(n => n.notice_type === type);
    renderNotices(filtered);
  }

  function renderNotices(notices) {
    if (!notices.length) {
      document.getElementById('noticesGrid').innerHTML = `
        <div class="empty-state" style="grid-column:1/-1;">
          <div class="empty-state-icon">📢</div>
          <h3>No Notices Found</h3>
          <p>No notices match the selected filter.</p>
          <button class="btn btn-primary" onclick="openAddNotice()">Post First Notice</button>
        </div>`;
      return;
    }
    document.getElementById('noticesGrid').innerHTML = notices.map(n => {
      const cfg = typeConfig[n.notice_type] || typeConfig.general;
      return `
        <div class="card" style="border-color:${cfg.border};transition:all 0.3s;" onmouseover="this.style.transform='translateY(-4px)'" onmouseout="this.style.transform='none'">
          <div style="padding:20px 24px 0;">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:16px;">
              <div style="display:flex;align-items:center;gap:10px;">
                <div style="width:40px;height:40px;border-radius:10px;background:${cfg.bg};display:flex;align-items:center;justify-content:center;font-size:1.1rem;border:1px solid ${cfg.border};">${cfg.icon}</div>
                <div>
                  <span style="display:inline-block;padding:2px 8px;border-radius:20px;font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;background:${cfg.bg};color:${cfg.color};border:1px solid ${cfg.border};">${cfg.label}</span>
                  <div style="font-size:0.7rem;color:var(--text-muted);margin-top:2px;">${n.audience === 'all' ? '👥 Everyone' : n.audience === 'students' ? '🎓 Students' : '👨‍🏫 Faculty'}</div>
                </div>
              </div>
              <div style="display:flex;gap:6px;flex-shrink:0;">
                <button class="btn btn-ghost btn-sm btn-icon" onclick='editNotice(${JSON.stringify(n).replace(/'/g,"\\'")})'  title="Edit">✏️</button>
                <button class="btn btn-danger btn-sm btn-icon" onclick="deleteNotice(${n.id})" title="Delete">🗑️</button>
              </div>
            </div>
            <h3 style="font-size:1rem;font-weight:700;color:var(--text-primary);margin-bottom:10px;line-height:1.3;">${n.title}</h3>
            <p style="font-size:0.825rem;line-height:1.6;color:var(--text-secondary);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;">${n.content}</p>
          </div>
          <div style="padding:14px 24px;border-top:1px solid var(--border-light);margin-top:16px;display:flex;align-items:center;justify-content:space-between;">
            <div style="font-size:0.75rem;color:var(--text-muted);">
              <span>By <strong style="color:var(--text-secondary);">${n.posted_by_name || 'Admin'}</strong></span>
            </div>
            <div style="font-size:0.72rem;color:var(--text-muted);">${Utils.formatDate(n.created_at)}</div>
          </div>
        </div>
      `;
    }).join('');
  }

  function openAddNotice() {
    document.getElementById('noticeModalTitle').textContent = '📢 Post New Notice';
    document.getElementById('editNoticeId').value = '';
    document.getElementById('noticeTitle').value = '';
    document.getElementById('noticeContent').value = '';
    document.getElementById('noticeType').value = 'general';
    document.getElementById('noticeAudience').value = 'all';
    Modal.open('noticeModal');
  }

  function editNotice(n) {
    document.getElementById('noticeModalTitle').textContent = '✏️ Edit Notice';
    document.getElementById('editNoticeId').value = n.id;
    document.getElementById('noticeTitle').value = n.title;
    document.getElementById('noticeContent').value = n.content;
    document.getElementById('noticeType').value = n.notice_type;
    document.getElementById('noticeAudience').value = n.audience;
    Modal.open('noticeModal');
  }

  async function saveNotice() {
    const id = document.getElementById('editNoticeId').value;
    const payload = {
      title: document.getElementById('noticeTitle').value,
      content: document.getElementById('noticeContent').value,
      notice_type: document.getElementById('noticeType').value,
      audience: document.getElementById('noticeAudience').value,
    };
    if (!payload.title || !payload.content) return Toast.warning('Please fill title and content.');
    try {
      let notice;
      if (id) { notice = await API.patch(`/notices/${id}/`, payload); Toast.success('Notice updated!'); }
      else { notice = await API.post('/notices/', payload); Toast.success('Notice posted!'); }
      Modal.close('noticeModal');
      if (socket?.connected) socket.emit('notice:posted', notice);
      loadNotices();
    } catch (e) { Toast.error('Failed to save notice.'); }
  }

  async function deleteNotice(id) {
    if (!confirm('Delete this notice?')) return;
    try {
      await API.delete(`/notices/${id}/`);
      Toast.success('Notice deleted.');
      loadNotices();
    } catch (e) { Toast.error('Failed to delete.'); }
  }

  function initSocket() {
    try {
      socket = io(SOCKET_URL, { auth: { token: Auth.getToken() }, timeout: 2000 });
      socket.on('connect', () => { document.getElementById('rtStatus').innerHTML = '<div class="online-dot"></div> Live'; });
      socket.on('notice:new', () => { loadNotices(); Toast.info('New notice received!'); });
    } catch (e) {}
  }

  loadNotices();
  initSocket();
</script>
</body>
</html>
