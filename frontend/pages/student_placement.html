<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Placement Predictor — EduPulse</title>
  <meta name="description" content="AI-powered placement readiness score with company eligibility matching.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .score-hero {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.5rem;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 2.5rem;
      align-items: center;
      margin-bottom: 2rem;
      position: relative;
      overflow: hidden;
    }
    .score-hero::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 300px; height: 300px;
      border-radius: 50%;
      opacity: 0.06;
    }
    .score-hero.hero-high::before   { background: #00D4AA; }
    .score-hero.hero-medium::before { background: #FF9F43; }
    .score-hero.hero-low::before    { background: #FF6B6B; }
    .score-hero.hero-critical::before { background: #EE5A24; }

    .score-ring-wrap {
      position: relative;
      width: 160px; height: 160px;
      flex-shrink: 0;
    }
    .score-ring-wrap canvas { width: 160px !important; height: 160px !important; }
    .score-ring-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .score-ring-val {
      font-family: 'Outfit', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      line-height: 1;
    }
    .score-ring-label { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; }

    .score-meta h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    .score-badge {
      display: inline-block;
      padding: 0.3rem 1rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    .badge-high     { background: rgba(0,212,170,0.15);  color: #00D4AA; }
    .badge-medium   { background: rgba(255,159,67,0.15); color: #FF9F43; }
    .badge-low      { background: rgba(255,107,107,0.15);color: #FF6B6B; }
    .badge-critical { background: rgba(238,90,36,0.15);  color: #EE5A24; }
    .badge-insufficient { background: rgba(160,160,192,0.15); color: #A0A0C0; }

    .factor-bars { display: grid; gap: 0.75rem; }
    .factor-bar-item {}
    .factor-bar-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.3rem;
      font-size: 0.82rem;
    }
    .factor-bar-track {
      height: 8px;
      background: var(--bg-secondary);
      border-radius: 999px;
      overflow: hidden;
    }
    .factor-bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 1s ease;
    }

    .companies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }
    .company-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem;
      transition: all 0.2s;
      cursor: default;
    }
    .company-card:hover { transform: translateY(-2px); border-color: var(--accent); }
    .company-card.locked { opacity: 0.45; }
    .company-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; }
    .company-logo {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: var(--bg-secondary);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
    }
    .company-name { font-weight: 700; font-size: 0.95rem; }
    .company-sector { font-size: 0.72rem; color: var(--text-muted); }
    .company-meta { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.5rem; }
    .meta-chip {
      font-size: 0.72rem;
      padding: 0.2rem 0.6rem;
      border-radius: 8px;
      background: var(--bg-secondary);
      color: var(--text-muted);
    }
    .package-chip {
      background: rgba(0,212,170,0.12);
      color: #00D4AA;
      font-weight: 600;
    }
    .eligible-badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 8px;
      font-size: 0.7rem;
      font-weight: 700;
    }
    .eligible-yes { background: rgba(0,212,170,0.12); color: #00D4AA; }
    .eligible-no  { background: rgba(255,107,107,0.12); color: #FF6B6B; }

    .tips-list { display: grid; gap: 0.6rem; }
    .tip-item {
      display: flex; gap: 0.75rem; align-items: flex-start;
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 12px; padding: 0.875rem;
    }
    .tip-icon { font-size: 1.1rem; flex-shrink: 0; }

    @media(max-width: 640px) {
      .score-hero { grid-template-columns: 1fr; justify-items: center; text-align: center; }
    }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"><!-- injected by JS --></aside>

  <div class="main-content">
    <header class="header">
      <div>
        <div class="header-title">Placement Predictor</div>
        <div class="header-subtitle">AI-powered readiness analysis</div>
      </div>
      <div class="header-spacer"></div>
      <button class="btn btn-primary" onclick="recomputeScore()" id="recomputeBtn">🔄 Recompute Score</button>
    </header>

    <main class="page-content">

      <!-- Score Hero -->
      <div class="score-hero" id="scoreHero">
        <div class="score-ring-wrap">
          <canvas id="scoreChart"></canvas>
          <div class="score-ring-center">
            <div class="score-ring-val" id="scoreVal">—</div>
            <div class="score-ring-label">/ 100</div>
          </div>
        </div>
        <div class="score-meta">
          <div class="score-badge" id="scoreBadge">Loading...</div>
          <h2 id="scoreTitle">Calculating your placement readiness...</h2>
          <p style="color:var(--text-muted); font-size:0.9rem; margin-bottom:1.25rem;" id="scoreComputedAt"></p>
          <div class="factor-bars" id="factorBars">
            <div class="factor-bar-item">
              <div class="factor-bar-header"><span>📊 CPI (40%)</span><span id="fb-cpi">—</span></div>
              <div class="factor-bar-track"><div class="factor-bar-fill" id="fb-cpi-bar" style="width:0%;background:#6C63FF;"></div></div>
            </div>
            <div class="factor-bar-item">
              <div class="factor-bar-header"><span>✅ Attendance (20%)</span><span id="fb-att">—</span></div>
              <div class="factor-bar-track"><div class="factor-bar-fill" id="fb-att-bar" style="width:0%;background:#00D4AA;"></div></div>
            </div>
            <div class="factor-bar-item">
              <div class="factor-bar-header"><span>📚 Backlogs (25%)</span><span id="fb-back">—</span></div>
              <div class="factor-bar-track"><div class="factor-bar-fill" id="fb-back-bar" style="width:0%;background:#FF9F43;"></div></div>
            </div>
            <div class="factor-bar-item">
              <div class="factor-bar-header"><span>🏆 Activities (15%)</span><span id="fb-extra">—</span></div>
              <div class="factor-bar-track"><div class="factor-bar-fill" id="fb-extra-bar" style="width:0%;background:#FF6B6B;"></div></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Improvement Tips -->
      <div class="card" id="tipsSection" style="display:none;margin-bottom:2rem;">
        <div class="card-header"><h3>💡 Improvement Recommendations</h3></div>
        <div class="card-body">
          <div class="tips-list" id="tipsList"></div>
        </div>
      </div>

      <!-- Companies -->
      <div class="card">
        <div class="card-header">
          <h3>🏢 Company Eligibility</h3>
          <div style="display:flex;gap:0.5rem;">
            <button class="btn btn-secondary btn-sm" onclick="filterCompanies('all')"   id="cf-all">All</button>
            <button class="btn btn-ghost    btn-sm" onclick="filterCompanies('eligible')" id="cf-eligible">✅ Eligible</button>
            <button class="btn btn-ghost    btn-sm" onclick="filterCompanies('locked')"   id="cf-locked">🔒 Not Yet</button>
          </div>
        </div>
        <div class="card-body">
          <div class="companies-grid" id="companiesGrid">
            <div class="empty-state"><div class="empty-state-icon">🏢</div><p>Loading companies...</p></div>
          </div>
        </div>
      </div>

    </main>
  </div>
</div>

<script src="../js/app.js"></script>
<script src="../js/supabase-client.js"></script>
<script>
  const user = Auth.requireAuth();
  if (!user) throw new Error('Not authenticated');
  const isStudent = user.role === 'student';

  // Build sidebar
  (function buildSidebar() {
    const sidebar = document.getElementById('sidebar');
    const initials = (user.first_name?.[0] || '') + (user.last_name?.[0] || '');
    const roleLabel = isStudent ? '🎓 Student' : '🛡️ Administrator';
    const dashHref  = isStudent ? '../dashboard/student.html' : '../dashboard/admin.html';
    const navLinks  = isStudent ? `
      <div class="nav-section-title">Main</div>
      <a class="nav-item" href="${dashHref}"><span class="nav-icon">📊</span> My Dashboard</a>
      <div class="nav-section-title">Academics</div>
      <a class="nav-item" href="student_attendance.html"><span class="nav-icon">✅</span> My Attendance</a>
      <a class="nav-item" href="student_grades.html"><span class="nav-icon">📝</span> My Grades</a>
      <a class="nav-item" href="student_timetable.html"><span class="nav-icon">📅</span> Timetable</a>
      <a class="nav-item" href="courses.html"><span class="nav-icon">📚</span> Courses</a>
      <a class="nav-item" href="student_content.html"><span class="nav-icon">📖</span> Study Materials</a>
      <a class="nav-item" href="student_doubts.html"><span class="nav-icon">❓</span> My Doubts Q&A</a>
      <div class="nav-section-title">Support & Info</div>
      <a class="nav-item" href="student_complaints.html"><span class="nav-icon">📣</span> My Complaints</a>
      <a class="nav-item" href="notices.html"><span class="nav-icon">📢</span> Notices</a>
      <div class="nav-section-title">Career & Wellness</div>
      <a class="nav-item active" href="student_placement.html"><span class="nav-icon">🎯</span> Placement Score</a>
      <a class="nav-item" href="student_wellness.html"><span class="nav-icon">💚</span> Wellness Tracker</a>` : '';
    sidebar.innerHTML = `
      <a class="sidebar-brand" href="${dashHref}">
        <div class="sidebar-brand-icon">🎓</div>
        <div class="sidebar-brand-text">
          <div class="sidebar-brand-title">EduPulse</div>
          <div class="sidebar-brand-subtitle">${isStudent ? 'Student Portal' : 'Admin Panel'}</div>
        </div>
      </a>
      <nav class="sidebar-nav">${navLinks}</nav>
      <div class="sidebar-footer">
        <div class="sidebar-user" onclick="Auth.logout()">
          <div class="user-avatar">${initials.toUpperCase() || 'U'}</div>
          <div class="user-info">
            <div class="user-name">${user.first_name} ${user.last_name}</div>
            <div class="user-role">${roleLabel}</div>
          </div>
          <span style="color:var(--text-muted);">⏻</span>
        </div>
      </div>`;
  })();

  let allCompanies = [];
  let myEligibleIds = [];
  let scoreRing;
  let currentFilter = 'all';

  // Draw score ring
  function drawScoreRing(score, color) {
    const ctx = document.getElementById('scoreChart').getContext('2d');
    if (scoreRing) scoreRing.destroy();
    scoreRing = new Chart(ctx, {
      type: 'doughnut',
      data: {
        datasets: [{
          data: [score, 100 - score],
          backgroundColor: [color, 'rgba(255,255,255,0.05)'],
          borderWidth: 0,
          circumference: 270,
          rotation: 225,
        }]
      },
      options: { cutout: '78%', plugins: { legend: { display: false }, tooltip: { enabled: false } }, animation: { duration: 1000 } }
    });
    document.getElementById('scoreVal').textContent = Math.round(score);
    document.getElementById('scoreVal').style.color = color;
  }

  function getCategoryColor(cat) {
    return { high: '#00D4AA', medium: '#FF9F43', low: '#FF6B6B', critical: '#EE5A24', insufficient: '#A0A0C0' }[cat] || '#A0A0C0';
  }

  async function loadScore() {
    try {
      const rows = await SupaAPI.placement.forStudent(user.id);
      const ps = rows?.[0];
      if (!ps) {
        drawScoreRing(0, '#A0A0C0');
        document.getElementById('scoreBadge').textContent = 'INSUFFICIENT DATA';
        document.getElementById('scoreBadge').className = 'score-badge badge-insufficient';
        document.getElementById('scoreTitle').textContent = 'Not enough academic history yet.';
        document.getElementById('scoreComputedAt').textContent = 'Complete at least one semester to see your score.';
        return;
      }
      myEligibleIds = ps.eligible_company_ids || [];
      const color = getCategoryColor(ps.category);
      drawScoreRing(ps.total_score, color);

      document.getElementById('scoreBadge').textContent = ps.category.toUpperCase();
      document.getElementById('scoreBadge').className = `score-badge badge-${ps.category}`;
      document.getElementById('scoreHero').className = `score-hero hero-${ps.category}`;
      document.getElementById('scoreTitle').textContent = getCategoryMessage(ps.category, ps.total_score);
      document.getElementById('scoreComputedAt').textContent = `Last computed: ${new Date(ps.computed_at).toLocaleDateString('en-IN', { day:'numeric', month:'long', year:'numeric' })}`;

      // Factor bars
      animateBar('fb-cpi',  ps.cpi_score,        40, `${ps.cpi?.toFixed(1)} CPI → ${ps.cpi_score?.toFixed(1)} pts`);
      animateBar('fb-att',  ps.attendance_score,  20, `${ps.attendance_pct?.toFixed(0)}% → ${ps.attendance_score?.toFixed(1)} pts`);
      animateBar('fb-back', ps.backlog_score,     25, `${ps.active_backlogs} backlogs → ${ps.backlog_score?.toFixed(1)} pts`);
      animateBar('fb-extra',ps.extra_score,       15, `${ps.extra_activities ? 'Activities ✓' : 'None'} → ${ps.extra_score?.toFixed(1)} pts`);

      // Tips
      if (ps.improvement_tips?.length) {
        document.getElementById('tipsSection').style.display = '';
        document.getElementById('tipsList').innerHTML = ps.improvement_tips.map((t, i) =>
          `<div class="tip-item"><span class="tip-icon">${['💡','🎯','📈','⚠️','🚀'][i % 5]}</span><span>${t}</span></div>`
        ).join('');
      }
    } catch (e) {
      console.error('Score load error:', e);
      Toast.error('Could not load placement score from Supabase.');
    }
  }

  function animateBar(id, score, max, label) {
    const pct = Math.min(100, (score / max) * 100);
    document.getElementById(id).textContent = label;
    setTimeout(() => { document.getElementById(`${id}-bar`).style.width = `${pct}%`; }, 100);
  }

  function getCategoryMessage(cat, score) {
    return {
      high:     `Excellent! You're placement-ready with a score of ${Math.round(score)}/100. 🎉`,
      medium:   `Good standing! Score ${Math.round(score)}/100 — a few improvements needed.`,
      low:      `Score ${Math.round(score)}/100 — action required to improve eligibility.`,
      critical: `Critical: ${Math.round(score)}/100 — urgent intervention needed. Meet your HOD.`,
    }[cat] || 'Calculating...';
  }

  async function loadCompanies() {
    try {
      allCompanies = await SupaAPI.companies.all();
      renderCompanies(allCompanies);
    } catch (e) {
      document.getElementById('companiesGrid').innerHTML = '<div class="empty-state"><div class="empty-state-icon">🏢</div><p>Could not load companies.</p></div>';
    }
  }

  function renderCompanies(list) {
    if (!list.length) {
      document.getElementById('companiesGrid').innerHTML = '<div class="empty-state"><div class="empty-state-icon">🏢</div><p>No companies listed.</p></div>';
      return;
    }
    const sectorEmoji = { IT: '💻', Finance: '💰', Core: '⚙️', Marketing: '📣', Consulting: '📊' };
    document.getElementById('companiesGrid').innerHTML = list.map(c => {
      const eligible = myEligibleIds.includes(c.id);
      return `<div class="company-card ${eligible ? '' : 'locked'}">
        <div class="company-header">
          <div class="company-logo">${sectorEmoji[c.sector] || '🏢'}</div>
          <div>
            <div class="company-name">${c.name}</div>
            <div class="company-sector">${c.sector || 'General'}</div>
          </div>
          <div style="margin-left:auto;">
            <span class="eligible-badge ${eligible ? 'eligible-yes' : 'eligible-no'}">${eligible ? '✅ Eligible' : '🔒 Locked'}</span>
          </div>
        </div>
        <div class="company-meta">
          <span class="meta-chip package-chip">₹${c.package_lpa} LPA</span>
          <span class="meta-chip">Min CPI: ${c.min_cpi}</span>
          <span class="meta-chip">Backlogs: ≤${c.max_backlogs}</span>
          <span class="meta-chip">Attend: ≥${c.min_attendance}%</span>
        </div>
        ${c.roles ? `<div style="margin-top:0.5rem;font-size:0.78rem;color:var(--text-muted);">Roles: ${c.roles}</div>` : ''}
        ${c.bond_years ? `<div style="margin-top:0.25rem;font-size:0.72rem;color:var(--text-muted);">Bond: ${c.bond_years} years</div>` : ''}
      </div>`;
    }).join('');
  }

  function filterCompanies(type) {
    currentFilter = type;
    ['all','eligible','locked'].forEach(t => {
      document.getElementById(`cf-${t}`).className = t === type ? 'btn btn-secondary btn-sm' : 'btn btn-ghost btn-sm';
    });
    if (type === 'eligible') renderCompanies(allCompanies.filter(c => myEligibleIds.includes(c.id)));
    else if (type === 'locked') renderCompanies(allCompanies.filter(c => !myEligibleIds.includes(c.id)));
    else renderCompanies(allCompanies);
  }

  async function recomputeScore() {
    Toast.info('Score is computed from your grades and attendance data. Refresh to update.');
  }

  loadScore();
  loadCompanies();
</script>
</body>
</html>
