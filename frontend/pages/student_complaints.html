<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Complaints — EduPulse Student</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .status-badge { padding:4px 12px; border-radius:20px; font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
    .s-pending    { background:rgba(255,159,67,0.15); color:#FF9F43; }
    .s-in_review  { background:rgba(84,160,255,0.15); color:#54A0FF; }
    .s-resolved   { background:rgba(0,212,170,0.15);  color:#00D4AA; }
    .s-dismissed  { background:rgba(160,160,192,0.1); color:#A0A0C0; }

    .complaint-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 16px; padding: 22px 24px; margin-bottom: 14px;
      transition: box-shadow 0.2s;
    }
    .complaint-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.2); }
    .complaint-top { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; margin-bottom:10px; flex-wrap:wrap; }
    .complaint-title { font-weight:700; font-size:1rem; color:var(--text-primary); }
    .complaint-meta  { font-size:0.75rem; color:var(--text-muted); margin-top:4px; }
    .complaint-body  { font-size:0.875rem; color:var(--text-secondary); line-height:1.6; margin-bottom:12px; }
    .hod-response {
      background: rgba(0,212,170,0.06); border:1px solid rgba(0,212,170,0.2);
      border-radius:10px; padding:12px 16px; margin-top:12px;
    }
    .hod-response-label { font-size:0.7rem; font-weight:700; color:#00D4AA; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; }
    .hod-response-text  { font-size:0.85rem; color:var(--text-secondary); line-height:1.5; }

    .cat-chip {
      display:inline-block; padding:3px 10px; border-radius:20px; font-size:0.7rem; font-weight:600;
      background:rgba(108,99,255,0.12); color:var(--primary-light); margin-right:6px;
    }

    /* Modal form */
    .form-group { margin-bottom:18px; }
    .form-label { display:block; font-size:0.8rem; font-weight:600; color:var(--text-secondary); margin-bottom:6px; }
    .form-control {
      width:100%; background:var(--bg-input); border:1px solid var(--border);
      border-radius:10px; padding:10px 14px; color:var(--text-primary);
      font-size:0.875rem; font-family:'Inter',sans-serif; outline:none; transition:0.2s;
    }
    .form-control:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(108,99,255,0.15); }
    textarea.form-control { resize:vertical; min-height:90px; }
    .anon-check { display:flex; align-items:center; gap:8px; font-size:0.82rem; color:var(--text-secondary); cursor:pointer; }
    .anon-check input { accent-color:var(--primary); width:16px; height:16px; }

    .empty-state { text-align:center; padding:70px 20px; color:var(--text-muted); }
    .empty-icon  { font-size:4rem; margin-bottom:16px; }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <a class="sidebar-brand" href="../dashboard/student.html">
      <div class="sidebar-brand-icon">🎓</div>
      <div class="sidebar-brand-text">
        <div class="sidebar-brand-title">EduPulse</div>
        <div class="sidebar-brand-subtitle">Student Portal</div>
      </div>
    </a>
    <nav class="sidebar-nav">
      <div class="nav-section-title">Main</div>
      <a class="nav-item" href="../dashboard/student.html"><span class="nav-icon">📊</span> My Dashboard</a>
      <div class="nav-section-title">Academics</div>
      <a class="nav-item" href="student_attendance.html"><span class="nav-icon">✅</span> My Attendance</a>
      <a class="nav-item" href="student_grades.html"><span class="nav-icon">📝</span> My Grades</a>
      <a class="nav-item" href="student_timetable.html"><span class="nav-icon">📅</span> Timetable</a>
      <a class="nav-item" href="courses.html"><span class="nav-icon">📚</span> Courses</a>
      <div class="nav-section-title">Support &amp; Info</div>
      <a class="nav-item active" href="student_complaints.html"><span class="nav-icon">📣</span> My Complaints</a>
      <a class="nav-item" href="notices.html"><span class="nav-icon">📢</span> Notices</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user" onclick="Auth.logout()">
        <div class="user-avatar" data-user-initials>S</div>
        <div class="user-info">
          <div class="user-name" data-user-name>Student</div>
          <div class="user-role">🎓 Student</div>
        </div>
        <span style="color:var(--text-muted);">⏻</span>
      </div>
    </div>
  </aside>

  <div class="main-content">
    <header class="header">
      <div>
        <div class="header-title">My Complaints</div>
        <div class="header-subtitle">Raise and track your complaints to the HOD</div>
      </div>
      <div class="header-spacer"></div>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="Modal.open('newComplaintModal')">✍️ Raise Complaint</button>
      </div>
    </header>

    <main class="page-content">
      <div class="page-header">
        <div class="page-header-left">
          <h1>📣 My Complaints</h1>
          <p id="pageSubtitle">Loading…</p>
        </div>
      </div>

      <div id="complaintsList">
        <div style="text-align:center;padding:60px;"><div class="loading-spinner" style="margin:0 auto;"></div></div>
      </div>
    </main>
  </div>
</div>

<!-- ── New Complaint Modal ── -->
<div class="modal-overlay" id="newComplaintModal">
  <div class="modal" style="max-width:520px;">
    <div class="modal-header">
      <div class="modal-title">✍️ Raise a Complaint</div>
      <button class="modal-close" onclick="Modal.close('newComplaintModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Category *</label>
        <select class="form-control" id="c_category">
          <option value="academic">Academic</option>
          <option value="facility">Facility</option>
          <option value="faculty">Faculty Behaviour</option>
          <option value="administrative">Administrative</option>
          <option value="other" selected>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Title *</label>
        <input type="text" class="form-control" id="c_title" placeholder="Brief title of your complaint">
      </div>
      <div class="form-group">
        <label class="form-label">Description *</label>
        <textarea class="form-control" id="c_description" rows="4" placeholder="Describe your complaint in detail…"></textarea>
      </div>
      <div class="form-group">
        <label class="anon-check">
          <input type="checkbox" id="c_anonymous">
          Submit anonymously (your name will be hidden from HOD)
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="Modal.close('newComplaintModal')">Cancel</button>
      <button class="btn btn-primary" id="submitComplaintBtn" onclick="submitComplaint()">📤 Submit Complaint</button>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
  Auth.requireRole('student');

  const statusClass = { pending:'s-pending', in_review:'s-in_review', resolved:'s-resolved', dismissed:'s-dismissed' };
  const statusLabel = { pending:'⏳ Pending', in_review:'🔍 In Review', resolved:'✅ Resolved', dismissed:'❌ Dismissed' };
  const catLabel    = { academic:'Academic', facility:'Facility', faculty:'Faculty Behaviour', administrative:'Administrative', other:'Other' };

  let complaints = [];

  function render() {
    const container = document.getElementById('complaintsList');
    document.getElementById('pageSubtitle').textContent =
      `${complaints.length} complaint${complaints.length !== 1 ? 's' : ''} raised by you.`;

    if (!complaints.length) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <h3 style="color:var(--text-primary);margin-bottom:8px;">No Complaints Yet</h3>
          <p>If you have any issue, click <strong>Raise New Complaint</strong> to notify the HOD.</p>
        </div>`;
      return;
    }

    container.innerHTML = complaints.map(c => {
      const sc = statusClass[c.status] || 's-pending';
      const sl = statusLabel[c.status] || c.status;
      const cat = catLabel[c.category] || c.category;
      const date = new Date(c.created_at).toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'numeric'});
      return `
        <div class="complaint-card">
          <div class="complaint-top">
            <div>
              <div class="complaint-title">${c.title}</div>
              <div class="complaint-meta">
                <span class="cat-chip">${cat}</span>
                🗓️ ${date}
                ${c.is_anonymous ? ' &nbsp;🕵️ Anonymous' : ''}
              </div>
            </div>
            <span class="status-badge ${sc}">${sl}</span>
          </div>
          <div class="complaint-body">${c.description}</div>
          ${c.hod_response ? `
            <div class="hod-response">
              <div class="hod-response-label">🎓 HOD Response</div>
              <div class="hod-response-text">${c.hod_response}</div>
            </div>` : ''}
        </div>`;
    }).join('');
  }

  async function submitComplaint() {
    const btn = document.getElementById('submitComplaintBtn');
    const title = document.getElementById('c_title').value.trim();
    const description = document.getElementById('c_description').value.trim();
    const category = document.getElementById('c_category').value;
    const is_anonymous = document.getElementById('c_anonymous').checked;

    if (!title || !description) return Toast.warning('Please fill title and description.');
    btn.disabled = true; btn.textContent = '⏳ Submitting…';
    try {
      await API.post('/complaints/', { title, description, category, is_anonymous });
      Toast.success('Complaint submitted to HOD!');
      Modal.close('newComplaintModal');
      document.getElementById('c_title').value = '';
      document.getElementById('c_description').value = '';
      document.getElementById('c_anonymous').checked = false;
      await loadComplaints();
    } catch (e) {
      Toast.error('Failed to submit complaint.');
    } finally {
      btn.disabled = false; btn.textContent = '📤 Submit Complaint';
    }
  }

  async function loadComplaints() {
    try {
      const data = await API.get('/complaints/');
      complaints = Array.isArray(data) ? data : (data.results || []);
      render();
    } catch (e) {
      document.getElementById('complaintsList').innerHTML =
        '<p style="padding:30px;color:var(--text-muted);">Could not load complaints.</p>';
    }
  }

  loadComplaints();
</script>
</body>
</html>
